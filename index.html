<script>
// LÕI XÁC ĐỊNH ĐÀI THEO NGÀY (THỨ TRONG TUẦN)
const LICH_QUAY = {
    "MT": {
        1: ["Thừa T. Huế", "Phú Yên"],
        2: ["Đắk Lắk", "Quảng Nam"],
        3: ["Đà Nẵng", "Khánh Hòa"],
        4: ["Bình Định", "Quảng Trị", "Quảng Bình"],
        5: ["Gia Lai", "Ninh Thuận"],
        6: ["Đà Nẵng", "Quảng Ngãi", "Đắk Nông"],
        0: ["Khánh Hòa", "Kon Tum"]
    },
    "MN": {
        1: ["TP.HCM", "Đồng Tháp", "Cà Mau"],
        2: ["Bến Tre", "Vũng Tàu", "Bạc Liêu"],
        3: ["Đồng Nai", "Cần Thơ", "Sóc Trăng"],
        4: ["Tây Ninh", "An Giang", "Bình Thuận"],
        5: ["Vĩnh Long", "Bình Dương", "Trà Vinh"],
        6: ["TP.HCM", "Long An", "Bình Phước", "Hậu Giang"],
        0: ["Tiền Giang", "Kiên Giang", "Đà Lạt"]
    }
};

function openDraw(regionCode, regionName){
    switchPage('page-draw');
    const now = new Date();
    const thu = now.getDay(); // 0: CN, 1: Thứ 2...
    
    document.getElementById('currentRegionName').innerText = regionName;
    
    // NẾU LÀ MIỀN NAM/TRUNG -> ẨN BẢNG TẦN SUẤT LÔ ĐỂ NHƯỜNG CHỖ
    const lotoSection = document.querySelector('.loto-title');
    const lotoChart = document.getElementById('lotoChart');
    if(regionCode !== 'MB') {
        lotoSection.style.display = 'none';
        lotoChart.style.display = 'none';
    } else {
        lotoSection.style.display = 'block';
        lotoChart.style.display = 'flex';
    }

    // LẤY DANH SÁCH ĐÀI HÔM NAY
    let dscacdai = (regionCode === 'MB') ? ["MIỀN BẮC"] : LICH_QUAY[regionCode][thu];
    
    // TẠO GIAO DIỆN CHIA CỘT (2 ĐÀI HOẶC 3 ĐÀI)
    setupStationColumns(dscacdai, regionCode);
}

function setupStationColumns(dais, region) {
    let resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = ""; // Xóa cũ
    
    // Tính toán độ rộng bọc thép
    let columnWidth = (100 / dais.length) - 1; 
    
    let container = document.createElement("div");
    container.style.display = "flex";
    container.style.gap = "4px";
    
    dais.forEach(dai => {
        let col = document.createElement("div");
        col.style.width = columnWidth + "%";
        col.innerHTML = `<div style="background:#333; color:#fff; text-align:center; font-size:10px; padding:4px; border-radius:4px; margin-bottom:8px;">${dai}</div>`;
        col.id = "col-" + dai;
        container.appendChild(col);
    });
    
    resultArea.appendChild(container);
    // Bắt đầu quy trình "Quay ở trên - Rơi xuống dưới"
    startFallingDraw(dais, region);
}
</script>
