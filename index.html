<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xổ số miền Bắc</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

/* HEADER /
.header {
  text-align: center;
  margin-bottom: 15px;
}
.header h1 {
  font-size: 22px;
  font-weight: bold;
}
.header p {
  color: #666;
}

/ CONTROL /
.control-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}
.control-panel label {
  background: #fff;
  border: 1px solid #ddd;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

/ TABLE /
.table {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
}

.row {
  display: grid;
  grid-template-columns: 100px 1fr;
  align-items: center;
  margin-bottom: 10px;
}

.label {
  font-weight: bold;
}

.numbers {
  display: grid;
  gap: 8px;
}

/ GRID /
.g2 { grid-template-columns: repeat(2, 1fr); }
.g3 { grid-template-columns: repeat(3, 1fr); }
.g4 { grid-template-columns: repeat(4, 1fr); }

/ NUMBER /
.number {
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px;
  text-align: center;
  font-weight: bold;
}

/ SPECIAL /
.special .number {
  border: 2px solid red;
  color: red;
  font-size: 18px;
}

/ ANIMATION /
.blink {
  animation: blink 0.5s infinite alternate;
}
@keyframes blink {
  from { background: #fff; }
  to { background: #ffeaa7; }
}

/ MOBILE */
@media (max-width:768px){
  .row {
    grid-template-columns: 70px 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>XỔ SỐ MIỀN BẮC</h1>
  <p>Hà Nội - Thứ X - Ngày DD/MM/YYYY</p>
</div>

<div class="control-panel">
  <label><input type="checkbox" id="toggleHide"> Lặn số</label>
  <label><input type="checkbox" id="toggleAnim"> Hiệu ứng</label>
</div>

<div class="table">

  <div class="row special">
    <div class="label">ĐB</div>
    <div class="numbers g1">
      <div class="number">82567</div>
    </div>
  </div>

  <div class="row">
    <div class="label">G1</div>
    <div class="numbers g1">
      <div class="number">34195</div>
    </div>
  </div>

  <div class="row">
    <div class="label">G2</div>
    <div class="numbers g2">
      <div class="number">61204</div>
      <div class="number">47839</div>
    </div>
  </div>

  <div class="row">
    <div class="label">G3</div>
    <div class="numbers g3">
      <div class="number">90153</div>
      <div class="number">28476</div>
      <div class="number">53821</div>
      <div class="number">74690</div>
      <div class="number">16348</div>
      <div class="number">39072</div>
    </div>
  </div>

</div>

<script>
// LẶN SỐ
document.getElementById("toggleHide").addEventListener("change", function(e){
  document.querySelectorAll(".number").forEach(el=>{
    el.style.filter = e.target.checked ? "blur(6px)" : "none";
  });
});

// HIỆU ỨNG
document.getElementById("toggleAnim").addEventListener("change", function(e){
  document.querySelectorAll(".number").forEach(el=>{
    if(e.target.checked){
      el.classList.add("blink");
    } else {
      el.classList.remove("blink");
    }
  });
});
</script>

</body>
</html>
