<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ứng Dụng Xổ Số</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Be Vietnam Pro', Arial, sans-serif;
    background:#f5f6f8;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

.app{
    display:flex;
    flex-direction:column;
    height:100%;
}

/* HEADER TRANG CHỦ */
.header{
    background:#ffffff;
    padding:16px 18px;
    text-align:center;
    border-bottom:1px solid #eeeeee;
}

.time-line{
    font-size:15px;
    font-weight:600;
    color:#d90429;
    margin-bottom:6px;
}

.message-line{
    font-size:14px;
    font-weight:500;
    color:#ff1744;
}

/* QUẢN LÝ CHUYỂN TRANG */
.page{
    display:none;
    flex-direction:column;
    height:100%;
}

.page.active{
    display:flex;
}

/* KHUNG CHỨA NỘI DUNG */
.content{
    flex:1;
    overflow:auto;
    padding:18px;
}

/* NÚT TRANG CHỦ */
.home{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-top:24px;
}

.button{
    width:100%;
    max-width:380px;
    margin:0 auto;
    min-height:56px;
    padding:10px 14px;
    border-radius:14px;
    border:none;
    font-size:15px;
    line-height:1.3;
    font-weight:700;
    text-align:center;
    word-break:break-word;
    background:#ff1744;
    color:#ffffff;
    transition:transform 0.1s ease, opacity 0.1s ease;
}

.button:active{
    transform:scale(0.97);
    opacity:0.85;
}

/* HEADER TRANG 2 (NÚT TRỞ VỀ) */
.sub-header{
    display:flex;
    align-items:center;
    padding:16px 18px;
    background:#ffffff;
    border-bottom:1px solid #eeeeee;
}

.btn-back{
    background:none;
    border:none;
    font-weight:700;
    font-size:16px;
    color:#d90429;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:5px;
}

/* NÚT CHỌN MIỀN TÂM LÝ HỌC */
.region-select{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:10px;
}

.region-big-btn{
    width:100%;
    height:60px;
    border-radius:14px;
    border:none;
    font-weight:700;
    font-size:16px;
    color:#ffffff;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    transition:transform 0.1s ease, box-shadow 0.1s ease;
}

.region-big-btn:active{
    transform:translateY(3px);
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.btn-bac{ background:linear-gradient(135deg,#ff1744,#d90429); }
.btn-trung{ background:linear-gradient(135deg,#ff9100,#ff6d00); }
.btn-nam{ background:linear-gradient(135deg,#00b4db,#0083b0); }

</style>
</head>

<body>

<div class="app">

    <div id="page-home" class="page active">
        <div class="header">
            <div class="time-line" id="timeLine"></div>
            <div class="message-line" id="messageLine"></div>
        </div>

        <div class="content">
            <div class="home">
                <button class="button" id="btn-truc-tiep" onclick="switchPage('page-truc-tiep')">TRỰC TIẾP KẾT QUẢ XỔ SỐ HÀNG NGÀY</button>
                <button class="button">LÔ TỐP</button>
                <button class="button">100 NGÀY KẾT QUẢ</button>
                <button class="button">AI HƯỚNG DẪN [ĐANG PHÁT TRIỂN]</button>
            </div>
        </div>
    </div>

    <div id="page-truc-tiep" class="page">
        <div class="sub-header">
            <button class="btn-back" onclick="switchPage('page-home')">← Trở về Trang Chủ</button>
        </div>

        <div class="content">
            <div class="region-select">
                <button class="region-big-btn btn-bac">XỔ SỐ MIỀN BẮC</button>
                <button class="region-big-btn btn-trung">XỔ SỐ MIỀN TRUNG</button>
                <button class="region-big-btn btn-nam">XỔ SỐ MIỀN NAM</button>
            </div>
        </div>
    </div>

</div>

<script>
// LỆNH KÍCH HOẠT TELEGRAM WEB APP KHI MỞ TRANG
if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

// HỆ THẦN KINH CHUYỂN TRANG SIÊU TỐC
function switchPage(pageId){
    const pages = document.querySelectorAll('.page');
    pages.forEach(page => page.classList.remove('active'));

    const target = document.getElementById(pageId);
    if(target){
        target.classList.add('active');
    }
}

// HỆ THỐNG ĐỒNG HỒ
const messages=[
    "Hôm nay vận đỏ, anh em vào xem!",
    "Chuẩn bị quay rồi, vào nhanh!",
    "Còn 1 phút nữa bắt đầu!",
    "Chúc anh em hôm nay trúng lớn!",
    "Sẵn sàng chưa? Chuẩn bị mở thưởng!"
];

function updateTime(){
    const now=new Date();
    const days=["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];
    const day=days[now.getDay()];
    const dd=String(now.getDate()).padStart(2,'0');
    const mm=String(now.getMonth()+1).padStart(2,'0');
    const yyyy=now.getFullYear();
    const hh=String(now.getHours()).padStart(2,'0');
    const mi=String(now.getMinutes()).padStart(2,'0');
    const ss=String(now.getSeconds()).padStart(2,'0');
    
    document.getElementById("timeLine").innerText = `${day} - ${dd}/${mm}/${yyyy} - ${hh}:${mi}:${ss}`;
}
setInterval(updateTime,1000);
updateTime();

document.getElementById("messageLine").innerText = messages[Math.floor(Math.random()*messages.length)];
</script>

</body>
</html>
