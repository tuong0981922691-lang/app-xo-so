<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xổ Số Telegram - Kéo Vuốt Đỉnh Cao</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* [1] KỶ LUẬT MOBILE 420PX VÀ CHỐNG CUỘN TRANG (OVERFLOW: HIDDEN) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #111; --border: #e4e6eb;
            --primary: #d90429; --primary-light: #fff0f2;
            --sheet-bg: #ffffff; --sheet-handle: #bdc3c7;
        }
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background: #000; /* Nền ngoài cùng tối để tôn app lên */
            display: flex; justify-content: center; align-items: flex-start; 
            height: 100vh; overflow: hidden; /* Cấm cuộn dọc thân trang tuyệt đối */
        }
        .app-frame { 
            width: 100%; max-width: 420px; 
            height: 100vh; background: var(--bg); 
            position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* [2] BẢNG KẾT QUẢ XỔ SỐ (ÉP CỨNG Ở NỬA TRÊN MÀN HÌNH - 55vh) */
        .top-half {
            height: 55vh; /* Chỉ chiếm hơn nửa màn hình một chút */
            overflow-y: auto; /* Cho phép cuộn nhẹ bên trong nếu bảng quá dài */
            padding: 15px;
            padding-bottom: 30px; /* Chừa chỗ cho thanh kéo */
            background: var(--bg);
        }
        .header-title { font-size: 18px; font-weight: 900; color: var(--primary); text-align: center; margin-bottom: 15px; text-transform: uppercase;}
        
        /* Cấu trúc bảng nháp gọn gàng */
        .board { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .row { display: flex; border-bottom: 1px solid var(--border); align-items: stretch;}
        .row:last-child { border-bottom: none; }
        .lbl { flex: 0 0 50px; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: 900; color: #555; border-right: 1px solid var(--border); background: #f8f9fa;}
        .nums { flex: 1; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;}
        code.n { padding: 6px 12px; background: #fff; border: 1px solid #ccc; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 15px; font-weight: 800; }
        .row-db code.n { font-size: 20px; color: var(--primary); border-color: #ffb3c1; background: var(--primary-light); }

        /* [3] TẤM MÀN KÉO VUỐT (BOTTOM SHEET) - BÍ KÍP TELEGRAM */
        .bottom-sheet {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 85vh; /* Chiều cao tối đa khi kéo lên hết cỡ */
            background: var(--sheet-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            /* Mặc định đẩy xuống, chỉ ló lên phần đỉnh (khoảng 45vh từ dưới lên) */
            transform: translateY(40vh); 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; flex-direction: column;
            z-index: 100;
            will-change: transform; /* Tối ưu hóa render phần cứng khi vuốt */
        }

        /* Thanh Nắm Để Kéo (Drag Handle) */
        .drag-area {
            padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            cursor: grab;
            border-bottom: 1px solid var(--border);
            touch-action: none; /* Ngăn trình duyệt cuộn trang khi vuốt thanh này */
        }
        .drag-area:active { cursor: grabbing; }
        .drag-handle {
            width: 40px; height: 5px;
            background: var(--sheet-handle);
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .drag-title { font-size: 15px; font-weight: 900; color: #333; }

        /* Nội dung bên trong bảng kéo */
        .sheet-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto; /* Cuộn nội dung bên trong bảng thống kê */
            background: #fafafa;
        }

        /* Demo một bảng thống kê bên trong */
        .stat-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; font-weight: 700; color: #555; margin-bottom: 10px; }

    </style>
</head>
<body>

<div class="app-frame">
    
    <div class="top-half">
        <div class="header-title">Xổ Số Miền Bắc Live</div>
        
        <div class="board">
            <div class="row"><div class="lbl">G1</div><div class="nums"><code class="n">12345</code></div></div>
            <div class="row"><div class="lbl">G2</div><div class="nums"><code class="n">23456</code><code class="n">34567</code></div></div>
            <div class="row"><div class="lbl">G3</div><div class="nums"><code class="n">45678</code><code class="n">56789</code><code class="n">67890</code></div></div>
            <div class="row"><div class="lbl">G4</div><div class="nums"><code class="n">1122</code><code class="n">3344</code></div></div>
            <div class="row"><div class="lbl">G5</div><div class="nums"><code class="n">1234</code><code class="n">2345</code><code class="n">3456</code></div></div>
            <div class="row row-db"><div class="lbl">ĐB</div><div class="nums"><code class="n">99999</code></div></div>
        </div>
    </div>

    <div class="bottom-sheet" id="draggableSheet">
        <div class="drag-area" id="dragArea">
            <div class="drag-handle"></div>
            <div class="drag-title">VUỐT LÊN ĐỂ XEM THỐNG KÊ</div>
        </div>
        
        <div class="sheet-content">
            <h3 style="margin-bottom: 10px; color: #d90429; text-align: center;">BẢNG THỐNG KÊ CHI TIẾT</h3>
            <div class="stat-box">Dữ liệu Lô Gan 1</div>
            <div class="stat-box">Dữ liệu Lô Gan 2</div>
            <div class="stat-box">Bảng Đầu Đuôi Lô Tô</div>
            <div class="stat-box">Các con số chưa về...</div>
            <div class="stat-box">Kéo xuống để đóng lại!</div>
        </div>
    </div>

</div>

<script>
    // Khởi tạo Telegram Web App nếu có
    if(window.Telegram && Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

    // ==========================================
    // LOGIC THẦN KINH: KÉO VUỐT MƯỢT MÀ (TOUCH EVENTS)
    // ==========================================
    const sheet = document.getElementById('draggableSheet');
    const dragArea = document.getElementById('dragArea');
    
    let startY = 0; 
    let currentY = 0;
    let isDragging = false;
    
    // Vị trí mặc định (Đóng - Ló lên một chút)
    const CLOSED_Y = window.innerHeight * 0.40; // Tương đương 40vh
    // Vị trí mở toàn bộ (Che hết bảng xổ số)
    const OPENED_Y = 0; 

    // Ghi nhận ngón tay chạm vào
    dragArea.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        isDragging = true;
        // Tắt transition để kéo mượt dính chặt vào ngón tay
        sheet.style.transition = 'none'; 
    });

    // Ghi nhận ngón tay di chuyển
    dragArea.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentY = e.touches[0].clientY;
        
        // Tính toán quãng đường vuốt
        let deltaY = currentY - startY;
        
        // Lấy vị trí hiện tại của Sheet (lấy từ style transform)
        let transformValue = sheet.style.transform;
        let currentTranslateY = 0;
        if (transformValue.includes('translateY')) {
            currentTranslateY = parseFloat(transformValue.replace('translateY(', '').replace('px)', '').replace('vh)', ''));
            // Chuyển vh sang px nếu đang ở trạng thái vh
            if (transformValue.includes('vh')) {
                currentTranslateY = (currentTranslateY / 100) * window.innerHeight;
            }
        } else {
            currentTranslateY = CLOSED_Y;
        }

        let newY = currentTranslateY + deltaY;

        // Chặn không cho kéo vọt lên quá đỉnh
        if (newY < OPENED_Y) newY = OPENED_Y;
        // Chặn không cho kéo tụt xuống quá đáy
        if (newY > CLOSED_Y) newY = CLOSED_Y;

        // Áp dụng vị trí mới
        sheet.style.transform = `translateY(${newY}px)`;
        
        // Cập nhật lại điểm bắt đầu cho frame tiếp theo
        startY = currentY; 
    });

    // Ghi nhận ngón tay nhả ra -> Tự động bắt dính (Snap)
    dragArea.addEventListener('touchend', (e) => {
        isDragging = false;
        // Bật lại hiệu ứng mượt
        sheet.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
        
        // Lấy vị trí cuối cùng
        let finalY = parseFloat(sheet.style.transform.replace('translateY(', '').replace('px)', ''));
        
        // Nếu kéo qua ngưỡng giữa (Threshold) -> Bật lên hoặc Gập xuống
        let threshold = CLOSED_Y / 2;

        if (finalY < threshold) {
            // Ngón tay vuốt lên quá nửa -> Mở full
            sheet.style.transform = `translateY(${OPENED_Y}px)`;
            dragArea.querySelector('.drag-title').innerText = "VUỐT XUỐNG ĐỂ ĐÓNG";
        } else {
            // Ngón tay vuốt nhẹ -> Gập về như cũ
            sheet.style.transform = `translateY(40vh)`;
            dragArea.querySelector('.drag-title').innerText = "VUỐT LÊN ĐỂ XEM THỐNG KÊ";
        }
    });

</script>
</body>
</html>
