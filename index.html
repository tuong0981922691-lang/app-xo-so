<script>
/* =========================================
   [MÃ ĐỊNH DANH: JS-CORE] Logic Khởi Tạo & Giao Diện
   ========================================= */
if(window.Telegram && Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

function openDrawPage() { 
    document.getElementById('page-home').classList.remove('active'); 
    document.getElementById('page-draw').classList.add('active'); 
    if(!isDrawing) startDrawEngine(); // Tự động chạy máy khi mở trang
}
function goHome() { 
    document.getElementById('page-draw').classList.remove('active'); 
    document.getElementById('page-home').classList.add('active'); 
}

function updateTime(){
    const now=new Date();
    const days=["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];
    document.getElementById("timeLine").innerText = `${days[now.getDay()]} - ${now.toLocaleDateString('vi-VN')} - ${now.toLocaleTimeString('vi-VN')}`;
}
setInterval(updateTime,1000); updateTime();

/* =========================================
   [MÃ ĐỊNH DANH: JS-SWIPE] Bottom Sheet (Thống Kê)
   ========================================= */
const sheet = document.getElementById('bottomSheet');
let startY;
sheet.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
sheet.addEventListener('touchmove', (e) => {
    let currentY = e.touches[0].clientY;
    if (startY - currentY > 50) { sheet.classList.remove('collapsed'); } 
    else if (currentY - startY > 50) { sheet.classList.add('collapsed'); } 
});

/* =========================================
   [MÃ ĐỊNH DANH: JS-ENGINE] CỖ MÁY TRẠNG THÁI (DRAW ENGINE)
   ========================================= */
// Cấu trúc chuẩn 27 giải Miền Bắc (Tên, Số lượng ô, Độ dài số, Cột Grid)
const MB_CONFIG = [
    { name: "G1", count: 1, len: 5, grid: 1 },
    { name: "G2", count: 2, len: 5, grid: 2 },
    { name: "G3", count: 6, len: 5, grid: 3 },
    { name: "G4", count: 4, len: 4, grid: 4 },
    { name: "G5", count: 6, len: 4, grid: 3 },
    { name: "G6", count: 3, len: 3, grid: 3 },
    { name: "G7", count: 4, len: 2, grid: 4 }
];

let isDrawing = false;
let drawTimer = null;

// Hàm sinh số bọc thép & tự động nhuộm Đỏ 2 số cuối
function generateNumberHTML(len, isSpecial = false) {
    let max = Math.pow(10, len);
    let numStr = String(Math.floor(Math.random() * max)).padStart(len, "0");
    
    // Nếu là Đặc biệt hoặc G7 (2 số) -> Nguyên cục màu đỏ
    if (isSpecial || len === 2) return numStr; 
    
    // Nhuộm đỏ 2 số đuôi lô
    let head = numStr.slice(0, -2);
    let tail = numStr.slice(-2);
    return `${head}<span class="last-two">${tail}</span>`;
}

// Hàm dọn dẹp và xây lại bàn cờ 27 ô trước khi quay
function buildBoard() {
    const board = document.getElementById('result-board');
    let html = `
        <div class="db-rolling-strip" id="db-rolling" style="display:none;">0-0-0-0-0</div>
        <div class="prize-row grid-1"><div class="num-box db" id="prize-db">-----</div></div>
    `;
    MB_CONFIG.forEach(g => {
        html += `<div class="prize-row grid-${g.grid}">`;
        for(let i=0; i<g.count; i++) {
            html += `<div class="num-box" id="val-${g.name}-${i}">${"-".repeat(g.len)}</div>`;
        }
        html += `</div>`;
    });
    board.innerHTML = html;
}

// Cỗ máy chính thức nhả đạn
function startDrawEngine() {
    isDrawing = true;
    buildBoard(); // Xóa bài cũ, chia lại bài mới
    
    let currentGroup = 0; // Bắt đầu từ G1
    let currentRow = 0;
    
    // Hàm đệ quy nhả từ G1 đến G7
    function drawNext() {
        if (currentGroup >= MB_CONFIG.length) {
            // Xong G7 -> Kích hoạt chế độ Hồi Hộp cho Đặc Biệt
            drawSpecialPrize();
            return;
        }
        
        let g = MB_CONFIG[currentGroup];
        let el = document.getElementById(`val-${g.name}-${currentRow}`);
        
        // Nhả số có đuôi đỏ
        el.innerHTML = generateNumberHTML(g.len);
        
        currentRow++;
        if (currentRow >= g.count) {
            currentGroup++; // Nhảy sang giải tiếp theo
            currentRow = 0;
            drawTimer = setTimeout(drawNext, 600); // Đợi 0.6s để qua giải mới
        } else {
            drawTimer = setTimeout(drawNext, 250); // Đợi 0.25s nhả số tiếp theo trong cùng giải
        }
    }
    
    // Bắt đầu nhả đạn sau 1 giây
    drawTimer = setTimeout(drawNext, 1000);
}

// Logic hồi hộp cho Giải Đặc Biệt
function drawSpecialPrize() {
    const rollingStrip = document.getElementById('db-rolling');
    const dbBox = document.getElementById('prize-db');
    
    // 1. Giấu ô ĐB, Hiện dải nháy nháy
    dbBox.style.display = 'none';
    rollingStrip.style.display = 'block';
    
    let rollCount = 0;
    let rollInt = setInterval(() => {
        rollingStrip.innerText = Math.floor(Math.random()*100000).toString().padStart(5, '0').split('').join('-');
        rollCount++;
        if(rollCount > 15) { // Nháy 15 lần (~1.5s)
            clearInterval(rollInt);
            // 2. Tắt dải nháy, nổ kết quả ĐB đỏ rực
            rollingStrip.style.display = 'none';
            dbBox.style.display = 'block';
            dbBox.innerHTML = generateNumberHTML(5, true); // true = Full Đỏ
            isDrawing = false;
        }
    }, 100);
}
</script>
