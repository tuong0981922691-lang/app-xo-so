<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Xổ Số Thần Mèo - VIP Edition</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;width:100vw;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%}
.page{display:none;flex-direction:column;height:100%}
.page.active{display:flex}
.content{flex:1;overflow:auto;padding:12px}

/* HEADER & NAV */
.header{background:#fff;padding:16px;text-align:center;border-bottom:1px solid #eee}
.time-line{font-size:15px;font-weight:700;color:#d90429}
.sub-header{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#fff;border-bottom:1px solid #eee;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.btn-back{background:none;border:none;font-weight:700;font-size:14px;color:#d90429;cursor:pointer}

/* NÚT CHỌN MIỀN */
.button{width:100%;max-width:350px;margin:10px auto;height:56px;border-radius:12px;border:none;font-weight:900;background:#ff1744;color:#fff;display:block}
.region-big-btn{width:100%;height:60px;border-radius:14px;border:none;font-weight:900;color:#fff;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.btn-bac{background:linear-gradient(135deg,#ff1744,#d90429)}
.btn-trung{background:linear-gradient(135deg,#ff9100,#ff6d00)}
.btn-nam{background:linear-gradient(135deg,#00b4db,#0083b0)}

/* HIỆU ỨNG LỒNG CẦU (SPINNER) */
.draw-control{text-align:center;margin-bottom:15px}
.spinner-box{width:65px;height:65px;margin:0 auto;background:radial-gradient(circle,#fff9c4,#fbc02d);border:3px solid #f9a825;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(251,192,45,0.5);position:relative}
.spin-num{font-size:26px;font-weight:900;color:#333}

/* CHIA ĐÀI (COLUMNS) */
.station-grid{display:flex;gap:6px;justify-content:center;align-items:flex-start}
.station-col{flex:1;background:#fff;border-radius:10px;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05);min-height:300px}
.station-name{background:#333;color:#fff;font-size:10px;font-weight:900;text-align:center;padding:4px;border-radius:5px;margin-bottom:8px}

/* GIẢI THƯỞNG & HIỆU ỨNG RƠI */
.prize-item{margin-bottom:6px;text-align:center;border-bottom:1px solid #f0f0f0;padding-bottom:4px;position:relative}
.prize-label{font-size:9px;font-weight:700;color:#888;text-transform:uppercase}
.prize-val{font-family:monospace;font-size:16px;font-weight:900;color:#d90429;min-height:20px}

/* Animation Rơi */
@keyframes fallDown {
    0% {transform:translateY(-50px);opacity:0}
    100% {transform:translateY(0);opacity:1}
}
.fall{animation:fallDown 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards}

/* BẢNG TẦN SUẤT LÔ (CHỈ HIỆN MIỀN BẮC) */
.loto-section{margin-top:20px}
.loto-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
.loto-box{background:#e0e0e0;font-size:10px;font-weight:700;text-align:center;padding:4px 0;border-radius:4px;color:#888}
.loto-box.active{background:#ff1744;color:#fff;transform:scale(1.1);box-shadow:0 2px 5px rgba(255,23,68,0.4)}
</style>
</head>
<body>
<div class="app">
    <div id="p-home" class="page active">
        <div class="header"><div class="time-line" id="clock"></div></div>
        <div class="content"><button class="button" onclick="go('p-region')">TRỰC TIẾP XỔ SỐ</button></div>
    </div>
    <div id="p-region" class="page">
        <div class="sub-header"><button class="btn-back" onclick="go('p-home')">← Trở về</button><strong>CHỌN MIỀN</strong><div></div></div>
        <div class="content">
            <button class="region-big-btn btn-bac" onclick="startDraw('MB')">MIỀN BẮC</button>
            <button class="region-big-btn btn-trung" onclick="startDraw('MT')">MIỀN TRUNG</button>
            <button class="region-big-btn btn-nam" onclick="startDraw('MN')">MIỀN NAM</button>
        </div>
    </div>
    <div id="p-draw" class="page">
        <div class="sub-header"><button class="btn-back" onclick="stopDraw();go('p-region')">← Thoát</button><strong id="draw-title">...</strong><div></div></div>
        <div class="content">
            <div class="draw-control"><div class="spinner-box"><div class="spin-num" id="spin">--</div></div></div>
            <div class="station-grid" id="grid"></div>
            <div class="loto-section" id="loto-ui">
                <p style="text-align:center;font-weight:900;margin-bottom:8px">BẢNG TẦN SUẤT LÔ</p>
                <div class="loto-grid" id="loto-grid"></div>
            </div>
        </div>
    </div>
</div>
<script>
const tg = window.Telegram.WebApp; tg.expand();
function go(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}
setInterval(()=>{const n=new Date();document.getElementById('clock').innerText=n.toLocaleString('vi-VN')},1000);

const SCHEDULE = {
    MT: {1:["Huế","Yên"],2:["Lắk","Nam"],3:["Nẵng","Hòa"],4:["Định","Trị","Bình"],5:["Lai","Thuận"],6:["Nẵng","Ngãi","Nông"],0:["Hòa","Tum"]},
    MN: {1:["HCM","Tháp","Mau"],2:["Tre","Tàu","Liêu"],3:["Nai","Thơ","Trăng"],4:["Ninh","Giang","Thuận"],5:["Long","Dương","Vinh"],6:["HCM","An","Phước","Giang"],0:["Giang","Giang","Lạt"]}
};
const CFG = {MB:[["G1",1,5],["G2",2,5],["G3",6,5],["G4",4,4],["G5",6,4],["G6",3,3],["G7",4,2],["ĐB",1,5]],
             MT:[["G8",1,2],["G7",1,3],["G6",3,4],["G5",1,4],["G4",7,5],["G3",2,5],["G2",1,5],["G1",1,5],["ĐB",1,6]]};

let timer, spinInt;
function startDraw(reg){
    go('p-draw'); document.getElementById('draw-title').innerText = "XỔ SỐ "+(reg==='MB'?'MIỀN BẮC':reg==='MT'?'MIỀN TRUNG':'MIỀN NAM');
    const dais = reg==='MB'?["MIỀN BẮC"]:SCHEDULE[reg][new Date().getDay()];
    const grid = document.getElementById('grid'); grid.innerHTML = '';
    const lotoUI = document.getElementById('loto-ui'); lotoUI.style.display = reg==='MB'?'block':'none';
    if(reg==='MB') initLoto();
    
    dais.forEach(d=>{
        let c=document.createElement('div'); c.className='station-col'; c.id='col-'+d;
        c.innerHTML=`<div class='station-name'>${d}</div>`;
        const struct = reg==='MB'?CFG.MB:CFG.MT;
        struct.forEach(s=>{for(let i=0;i<s[1];i++){
            let p=document.createElement('div'); p.className='prize-item';
            p.innerHTML=`<div class='prize-label'>${s[0]}</div><div class='prize-val' id='val-${d}-${s[0]}-${i}'></div>`;
            c.appendChild(p);
        }});
        grid.appendChild(c);
    });
    run(dais, reg);
}

function initLoto(){
    const g=document.getElementById('loto-grid'); g.innerHTML='';
    for(let i=0;i<100;i++){let b=document.createElement('div');b.className='loto-box';b.id='lt-'+i;b.innerText=(i<10?'0':'')+i;g.appendChild(b)}
}

function run(dais, reg){
    let idx=0; const struct = reg==='MB'?CFG.MB:CFG.MT;
    spinInt = setInterval(()=>{document.getElementById('spin').innerText=Math.floor(Math.random()*10)},50);
    
    function next(){
        if(idx >= struct.length){clearInterval(spinInt);document.getElementById('spin').innerText='OK';return}
        const [label, count, len] = struct[idx];
        dais.forEach(d=>{
            for(let i=0;i<count;i++){
                setTimeout(()=>{
                    const val = Math.floor(Math.random()*Math.pow(10,len)).toString().padStart(len,'0');
                    const el = document.getElementById(`val-${d}-${label}-${i}`);
                    el.innerText = val; el.classList.add('fall');
                    if(reg==='MB'){let s=val.slice(-2);document.getElementById('lt-'+parseInt(s)).classList.add('active')}
                },i*200);
            }
        });
        idx++; timer = setTimeout(next, 1500);
    }
    next();
}
function stopDraw(){clearTimeout(timer);clearInterval(spinInt)}
</script>
</body>
</html>
