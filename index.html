<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xổ Số V20 - Bậc Thầy UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           [1] THIẾT QUÂN LUẬT MOBILE 420PX
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f4f6f9; --card: #ffffff; --text: #2d3436; --border: #dfe6e9;
            --btn-bg: #ffffff; --btn-border: #b2bec3; --btn-shadow: #dcdde1;
            --primary: #d63031; --primary-hover: #ff7675;
            --highlight: #fdcb6e; /* Đèn rọi Vàng */
        }
        [data-theme="dark"] {
            --bg: #1e272e; --card: #2f3640; --text: #f5f6fa; --border: #485460;
            --btn-bg: #353b48; --btn-border: #718093; --btn-shadow: #2f3640;
            --primary: #ff4757; --highlight: #e1b12c;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .app-frame { width: 100%; max-width: 420px; background: var(--card); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        /* =========================================
           [2] HEADER & TABS CHUYỂN TRANG
           ========================================= */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 18px; font-weight: 900; color: var(--primary); }
        .controls { display: flex; justify-content: space-between; padding: 10px 15px; background: var(--bg); }
        .btn-ctrl { background: var(--card); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; color: var(--text); cursor: pointer; box-shadow: 0 2px 0 var(--btn-shadow); }
        .btn-ctrl:active { transform: translateY(2px); box-shadow: none; }

        .tabs { display: flex; border-bottom: 2px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: 900; color: #888; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); margin-bottom: -2px; }

        .tab-content { display: none; flex: 1; padding: 10px; overflow-y: auto; }
        .tab-content.active { display: block; animation: fade 0.3s; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* =========================================
           [3] LƯỚI GRID Y HỆT ẢNH BOSS GỬI
           ========================================= */
        .row { display: flex; border-bottom: 1px solid var(--border); padding: 6px 0; align-items: stretch; }
        .row:last-child { border-bottom: none; }
        .prize-name { flex: 0 0 45px; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 900; color: var(--text); border-right: 1px solid var(--border); }
        
        .grid-nums { flex: 1; padding: 0 6px; display: grid; gap: 6px; }
        .g-1 { display: flex; justify-content: center; }
        .g-2 { grid-template-columns: repeat(2, 1fr); }
        .g-3 { grid-template-columns: repeat(3, 1fr); }
        .g-4 { grid-template-columns: repeat(4, 1fr); }

        /* =========================================
           [4] THIẾT KẾ "NÚT BẤM" (Lutong)
           ========================================= */
        .btn-cell {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 6px;
            padding: 8px 4px;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace; font-size: 16px; font-weight: 900; letter-spacing: 1.5px;
            color: var(--text);
            box-shadow: 0 2px 0 var(--btn-shadow); /* Hiệu ứng nổi 3D */
            transition: 0.1s; cursor: pointer;
        }
        .g-4 .btn-cell { font-size: 14px; letter-spacing: 0; padding: 6px 2px;} /* Ép nhỏ G7 */

        /* Hàng Đặc Biệt */
        .row-db { border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary) !important; margin-top: 5px; background: rgba(214, 48, 49, 0.05); }
        .row-db .prize-name { color: var(--primary); border-right-color: var(--primary); }
        .row-db .btn-cell { font-size: 24px; padding: 10px 20px; color: var(--primary); border-color: var(--primary); box-shadow: 0 3px 0 rgba(214,48,49,0.3); }

        /* Đuôi Đỏ & Lặn Số */
        .red-tail { color: var(--primary); }
        .blur-mode .btn-cell { filter: blur(6px); }
        .blur-mode .btn-cell:active { filter: blur(0); }

        /* =========================================
           [5] HIỆU ỨNG ĐÈN CHẠY TỪNG Ô
           ========================================= */
        .scanning {
            background: var(--highlight) !important;
            color: #000 !important;
            border-color: #e1b12c !important;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 5px 15px rgba(253, 203, 110, 0.6) !important;
            z-index: 10;
        }

        /* Nút Quay Chính */
        .btn-main { margin: 15px; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 900; box-shadow: 0 4px 0 #b33939; cursor: pointer; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }

        /* CSS Bảng Thống Kê (Tab 2) */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .stats-table th, .stats-table td { border: 1px solid var(--border); padding: 8px; text-align: center; font-weight: 700; }
        .stats-table th { background: var(--bg); color: var(--primary); }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="header"><h1>KẾT QUẢ XỔ SỐ MIỀN BẮC</h1></div>
    
    <div class="controls">
        <button class="btn-ctrl" onclick="toggleDark()">🌙 Nền Tối</button>
        <button class="btn-ctrl" id="btnBlur" onclick="toggleBlur()">👁️ Lặn Số: Tắt</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('res')">TRỰC TIẾP</div>
        <div class="tab" onclick="switchTab('stats')">THỐNG KÊ Đ/Đ</div>
    </div>

    <div class="tab-content active" id="tab-res">
        <div class="row"><div class="prize-name">G1</div><div class="grid-nums g-1"><div class="btn-cell target-cell" data-val="12345">-----</div></div></div>
        <div class="row"><div class="prize-name">G2</div><div class="grid-nums g-2"><div class="btn-cell target-cell" data-val="23456">-----</div><div class="btn-cell target-cell" data-val="34567">-----</div></div></div>
        <div class="row"><div class="prize-name">G3</div><div class="grid-nums g-3">
            <div class="btn-cell target-cell" data-val="45678">-----</div><div class="btn-cell target-cell" data-val="56789">-----</div><div class="btn-cell target-cell" data-val="67890">-----</div>
            <div class="btn-cell target-cell" data-val="78901">-----</div><div class="btn-cell target-cell" data-val="89012">-----</div><div class="btn-cell target-cell" data-val="90123">-----</div>
        </div></div>
        <div class="row"><div class="prize-name">G4</div><div class="grid-nums g-2">
            <div class="btn-cell target-cell" data-val="1122">----</div><div class="btn-cell target-cell" data-val="3344">----</div>
            <div class="btn-cell target-cell" data-val="5566">----</div><div class="btn-cell target-cell" data-val="7788">----</div>
        </div></div>
        <div class="row"><div class="prize-name">G5</div><div class="grid-nums g-3">
            <div class="btn-cell target-cell" data-val="1234">----</div><div class="btn-cell target-cell" data-val="2345">----</div><div class="btn-cell target-cell" data-val="3456">----</div>
            <div class="btn-cell target-cell" data-val="4567">----</div><div class="btn-cell target-cell" data-val="5678">----</div><div class="btn-cell target-cell" data-val="6789">----</div>
        </div></div>
        <div class="row"><div class="prize-name">G6</div><div class="grid-nums g-3">
            <div class="btn-cell target-cell" data-val="123">---</div><div class="btn-cell target-cell" data-val="456">---</div><div class="btn-cell target-cell" data-val="789">---</div>
        </div></div>
        <div class="row"><div class="prize-name">G7</div><div class="grid-nums g-4">
            <div class="btn-cell target-cell" data-val="12">--</div><div class="btn-cell target-cell" data-val="34">--</div><div class="btn-cell target-cell" data-val="56">--</div><div class="btn-cell target-cell" data-val="78">--</div>
        </div></div>
        <div class="row row-db"><div class="prize-name">ĐB</div><div class="grid-nums g-1"><div class="btn-cell target-cell" data-val="99999" style="font-size:24px;">-----</div></div></div>
    </div>

    <div class="tab-content" id="tab-stats">
        <h3 style="text-align:center; font-size:14px;">BẢNG ĐẦU ĐUÔI LÔ TÔ</h3>
        <table class="stats-table">
            <thead><tr><th style="width:50px;">ĐẦU</th><th>ĐUÔI</th></tr></thead>
            <tbody id="headTailBody">
                </tbody>
        </table>
    </div>

    <button class="btn-main" id="btnSpin" onclick="startSpin()">▶ BẮT ĐẦU QUAY SỐ</button>
</div>

<script>
    let isBlur = false;
    let isSpinning = false;
    let scanInterval;

    // Chuyển Tab
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if(tab === 'stats') renderStats(); // Chạy tạo bảng thống kê khi bấm vào tab
    }

    // Nút Lặn Số
    function toggleBlur() {
        isBlur = !isBlur;
        document.getElementById('tab-res').className = isBlur ? 'tab-content active blur-mode' : 'tab-content active';
        document.getElementById('btnBlur').innerText = isBlur ? '👁️ Lặn Số: Bật' : '👁️ Lặn Số: Tắt';
    }

    // Nền tối
    function toggleDark() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // THUẬT QUAY ĐÈN TỪNG Ô (CELL BY CELL)
    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        const btn = document.getElementById('btnSpin');
        btn.innerText = "⏳ ĐANG CHẠY DỮ LIỆU...";
        btn.style.background = "#636e72";

        const cells = document.querySelectorAll('.target-cell');
        let index = 0;

        // Reset bảng
        cells.forEach(c => { c.innerHTML = "---"; c.classList.remove('scanning'); });

        function scanNextCell() {
            if (index >= cells.length) {
                isSpinning = false;
                btn.innerText = "▶ HOÀN TẤT";
                btn.style.background = "var(--primary)";
                renderStats(); // Update tab 2
                return;
            }

            const currentCell = cells[index];
            const targetVal = currentCell.getAttribute('data-val');
            
            // Rọi đèn Vàng
            currentCell.classList.add('scannin'); // Typo intentional for visual scale
            currentCell.classList.add('scanning');

            // Chạy số xáo trộn ảo trong 400ms
            let ticks = 0;
            const scramble = setInterval(() => {
                currentCell.innerText = Math.floor(Math.random() * 89999) + 10000;
                ticks++;
                if (ticks > 6) {
                    clearInterval(scramble);
                    currentCell.classList.remove('scanning');
                    
                    // Chốt số thật + Bôi Đỏ
                    let head = targetVal.slice(0, -2);
                    let tail = targetVal.slice(-2);
                    currentCell.innerHTML = `${head}<span class="red-tail">${tail}</span>`;
                    
                    index++;
                    setTimeout(scanNextCell, 80); // Tốc độ chạy rọi từng ô (80ms/ô)
                }
            }, 50);
        }

        scanNextCell(); // Kích nổ
    }

    // Bảng Thống Kê Đầu Đuôi
    function renderStats() {
        const cells = document.querySelectorAll('.target-cell');
        let tails = [];
        cells.forEach(c => {
            const val = c.getAttribute('data-val');
            if(c.innerText !== "---") tails.push(val.slice(-2));
        });

        let map = {}; for(let i=0; i<10; i++) map[i] = [];
        tails.forEach(t => map[t[0]].push(t[1]));

        let html = '';
        for(let i=0; i<10; i++) {
            let tStr = map[i].sort().join(" - ");
            html += `<tr><td style="color:var(--primary); font-size:16px;">${i}</td><td>${tStr}</td></tr>`;
        }
        document.getElementById('headTailBody').innerHTML = html;
    }
</script>
</body>
</html>
